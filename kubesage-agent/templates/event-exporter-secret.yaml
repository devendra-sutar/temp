apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mychart.fullname" . }}-event-exporter-config
  labels:
    {{- include "mychart.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
    clusterName: "{{ .Values.clusterName }}"
    logFormat: json
    logLevel: debug
    maxEventAgeSeconds: 60

    ## Webhook Receiver Configuration
    receivers:
      - name: webhook-receiver
        webhook:
          endpoint: "https://{{ .Values.endpoint }}/api/remediation/v1/webhook/incidents"
          tls:
            insecureSkipVerify: true
          headers:
            X-Cluster-Name: "{{ .Values.clusterName }}"
            X-Agent-ID: "{{ .Values.agentId }}"
            X-API-Key: "{{ .Values.apiKey }}"
          layout:
            eventType: kubernetes-event
            metadata:
              creationTimestamp: "{{ "{{" }} .CreationTimestamp {{ "}}" }}"
              name: "{{ "{{" }} .Name {{ "}}" }}"
              namespace: "{{ "{{" }} .InvolvedObject.Namespace {{ "}}" }}"
              resource: "{{ "{{" }} .ResourceVersion {{ "}}" }}"
              uid: "{{ "{{" }} .UID {{ "}}" }}"
            reason: "{{ "{{" }} .Reason {{ "}}" }}"
            message: "{{ "{{" }} .Message {{ "}}" }}"
            type: "{{ "{{" }} .Type {{ "}}" }}"
            clusterName: "{{ "{{" }} .ClusterName {{ "}}" }}"
            source:
              component: "{{ "{{" }} .Source.Component {{ "}}" }}"
              host: "{{ "{{" }} .Source.Host {{ "}}" }}"
            firstTimestamp: "{{ "{{" }} .FirstTimestamp {{ "}}" }}"
            lastTimestamp: "{{ "{{" }} .LastTimestamp {{ "}}" }}"
            involvedObject:
              kind: "{{ "{{" }} .InvolvedObject.Kind {{ "}}" }}"
              name: "{{ "{{" }} .InvolvedObject.Name {{ "}}" }}"
              namespace: "{{ "{{" }} .InvolvedObject.Namespace {{ "}}" }}"
              apiVersion: "{{ "{{" }} .InvolvedObject.APIVersion {{ "}}" }}"
              resourceVersion: "{{ "{{" }} .InvolvedObject.ResourceVersion {{ "}}" }}"
              uid: "{{ "{{" }} .InvolvedObject.UID {{ "}}" }}"
              labels: "{{ "{{" }} .InvolvedObject.Labels | toJson {{ "}}" }}"
              annotations: "{{ "{{" }} .InvolvedObject.Annotations | toJson {{ "}}" }}"

    ## Routing Configuration
    route:
      routes:
        - drop:
          - type: Normal
        
        - drop:
          - namespace: kex
        
        - drop:
          - namespace: kube-event-tst
            involvedObject:
              name: event-exporter-*

        # Scenario 2,3,5: CrashLoopBackOff
        - match:
          - type: Warning
            reason: BackOff
            receiver: webhook-receiver

        # Scenario 6: OOMKilled
        - match:
          - type: Warning
            reason: OOMKilling
            receiver: webhook-receiver

        # Scenario 4: ImagePullBackOff / ErrImagePull
        - match:
          - type: Warning
            reason: ErrImagePull
            receiver: webhook-receiver
        
        - match:
          - type: Warning
            reason: ImagePullBackOff
            receiver: webhook-receiver
        
        - match:
          - type: Warning
            reason: Failed
            message: "*pull*image*"
            receiver: webhook-receiver

        # Scenario 9: Pod Pending / FailedScheduling
        - match:
          - type: Warning
            reason: FailedScheduling
            receiver: webhook-receiver

        # Scenario 8: Storage / PVC issues
        - match:
          - type: Warning
            reason: FailedMount
            receiver: webhook-receiver
        
        - match:
          - type: Warning
            reason: FailedAttachVolume
            receiver: webhook-receiver

        # Scenario 7: Node issues
        - match:
          - type: Warning
            reason: NodeNotReady
            receiver: webhook-receiver

        # Skill: cpu_throttling
        - match:
          - type: Warning
            reason: CPUThrottlingHigh
            receiver: webhook-receiver

        # Skill: deployment_stuck
        - match:
          - type: Warning
            reason: ProgressDeadlineExceeded
            receiver: webhook-receiver

        # Skill: cronjob_failed
        - match:
          - type: Warning
            reason: DeadlineExceeded
            receiver: webhook-receiver
        
        - match:
          - type: Warning
            reason: FailedCreate
            receiver: webhook-receiver

        # Skill: service_no_endpoints
        - match:
          - type: Warning
            reason: Unhealthy
            receiver: webhook-receiver

        # Skill: pvc_pending
        - match:
          - type: Warning
            reason: ProvisioningFailed
            receiver: webhook-receiver

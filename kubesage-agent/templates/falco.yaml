{{- include "requiredValues" . -}}

{{/* Define safe defaults to prevent nil pointer errors if values are missing */}}
{{- $installer := .Values.falcoInstaller | default dict -}}
{{- $saName := $installer.serviceAccountName | default "falco-admin-sa" -}}
{{- $targetNs := $installer.targetNamespace | default (include "mychart.namespace" .) -}}

---
# 1. Dynamic Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}
  namespace: {{ include "mychart.namespace" . }}
  labels:
    {{- include "mychart.labels" . | nindent 4 }}

---
# 2. Dynamic ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mychart.fullname" . }}-admin-binding
  labels:
    {{- include "mychart.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ $saName }}
  namespace: {{ include "mychart.namespace" . }}
roleRef:
  kind: ClusterRole
  name: cluster-admin 
  apiGroup: rbac.authorization.k8s.io

---
# 3. Dynamic ConfigMap for Custom Rules (The Values File)
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mychart.fullname" . }}-custom-rules
  namespace: {{ include "mychart.namespace" . }}
  labels:
    {{- include "mychart.labels" . | nindent 4 }}
data:
  custom-rules.yaml: |
    customRules:
      custom-rules.yaml: |-
        # SPDX-License-Identifier: Apache-2.0
        # Copyright (C) 2025 The Falco Authors.
        
        - required_engine_version: 0.55.0
        
        - required_plugin_versions:
            - name: container
              version: 0.2.2
        
        # ==========================================================
        #                    MACROS & LISTS
        # ==========================================================
        
        # --- NEW EXCEPTION FOR CALICO ---
        - macro: calico_runit_etc_writes
          condition: (k8s.ns.name="kube-system" and container.image.repository endswith "calico/node" and proc.name="sv")
        # --------------------------------

        # --- NEW EXCEPTION FOR OPENSHIFT SYSTEM PROCS ---
        - macro: openshift_system_etc_writes
          condition: >
            (k8s.ns.name="openshift-machine-config-operator" and container.name="machine-config-daemon") or 
            (k8s.ns.name="openshift-monitoring" and container.name="config-reloader")
        # ------------------------------------------------

        # --- NEW EXCEPTION FOR KUBEARMOR ---
        - macro: kubearmor_apparmor_writes
          condition: (k8s.ns.name="kubesage-agent" and container.name="kubearmor" and fd.name startswith "/etc/apparmor.d/")
        # -----------------------------------

        - macro: open_write
          condition: (evt.type in (open,openat,openat2) and evt.is_open_write=true and fd.typechar='f' and fd.num>=0)
        
        - macro: open_read
          condition: (evt.type in (open,openat,openat2) and evt.is_open_read=true and fd.typechar='f' and fd.num>=0)
        
        - macro: open_file_failed
          condition: (evt.type in (open,openat,openat2) and fd.typechar='f' and fd.num=-1 and evt.res startswith E)
        
        - macro: never_true
          condition: (evt.num=0)
        
        - macro: proc_name_exists
          condition: (not proc.name in ("<NA>","N/A"))
        
        - macro: spawned_process
          condition: (evt.type in (execve, execveat))
        
        - macro: create_symlink
          condition: (evt.type in (symlink, symlinkat))
        
        - macro: create_hardlink
          condition: (evt.type in (link, linkat))
        
        - macro: kernel_module_load
          condition: (evt.type in (init_module, finit_module))
        
        - macro: dup
          condition: (evt.type in (dup, dup2, dup3))
        
        - macro: etc_dir
          condition: (fd.name startswith /etc/)
        
        - macro: bin_dir
          condition: (fd.directory in (/bin, /sbin, /usr/bin, /usr/sbin))
        
        - list: shell_binaries
          items: [ash, bash, csh, ksh, sh, tcsh, zsh, dash]
        
        - macro: shell_procs
          condition: (proc.name in (shell_binaries))
        
        - list: login_binaries
          items: [
            login, systemd, '"(systemd)"', systemd-logind, su,
            nologin, faillog, lastlog, newgrp, sg
            ]
        
        - list: passwd_binaries
          items: [
            shadowconfig, grpck, pwunconv, grpconv, pwck,
            groupmod, vipw, pwconv, useradd, newusers, cppw, chpasswd, usermod,
            groupadd, groupdel, grpunconv, chgpasswd, userdel, chage, chsh,
            gpasswd, chfn, expiry, passwd, vigr, cpgr, adduser, addgroup, deluser, delgroup
            ]
        
        - list: shadowutils_binaries
          items: [
            chage, gpasswd, lastlog, newgrp, sg, adduser, deluser, chpasswd,
            groupadd, groupdel, addgroup, delgroup, groupmems, groupmod, grpck, grpconv, grpunconv,
            newusers, pwck, pwconv, pwunconv, useradd, userdel, usermod, vigr, vipw, unix_chkpwd
            ]
        
        - list: http_server_binaries
          items: [nginx, httpd, httpd-foregroun, lighttpd, apache, apache2]
        
        - list: db_server_binaries
          items: [mysqld, postgres, sqlplus]
        
        - list: postgres_mgmt_binaries
          items: [pg_dumpall, pg_ctl, pg_lsclusters, pg_ctlcluster]
        
        - list: nosql_server_binaries
          items: [couchdb, memcached, redis-server, rabbitmq-server, mongod]
        
        - list: gitlab_binaries
          items: [gitlab-shell, gitlab-mon, gitlab-runner-b, git]
        
        - macro: server_procs
          condition: (proc.name in (http_server_binaries, db_server_binaries, docker_binaries, sshd))
        
        - list: rpm_binaries
          items: [dnf, dnf-automatic, rpm, rpmkey, yum, '"75-system-updat"', rhsmcertd-worke, rhsmcertd, subscription-ma,
                  repoquery, rpmkeys, rpmq, yum-cron, yum-config-mana, yum-debug-dump,
                  abrt-action-sav, rpmdb_stat, microdnf, rhn_check, yumdb]
        
        - list: deb_binaries
          items: [dpkg, dpkg-preconfigu, dpkg-reconfigur, dpkg-divert, apt, apt-get, aptitude,
            frontend, preinst, add-apt-reposit, apt-auto-remova, apt-key,
            apt-listchanges, unattended-upgr, apt-add-reposit, apt-cache, apt.systemd.dai
            ]
        
        - list: python_package_managers
          items: [pip, pip3, conda, uv]
        
        - list: package_mgmt_binaries
          items: [rpm_binaries, deb_binaries, update-alternat, gem, npm, python_package_managers, sane-utils.post, alternatives, chef-client, apk, snapd]
        
        - macro: run_by_package_mgmt_binaries
          condition: (proc.aname in (package_mgmt_binaries, needrestart))
        
        - macro: package_mgmt_procs
          condition: (proc.name in (package_mgmt_binaries))
        
        - list: userexec_binaries
          items: [sudo, su, suexec, critical-stack, dzdo]
        
        - list: user_mgmt_binaries
          items: [login_binaries, passwd_binaries, shadowutils_binaries]
        
        - list: hids_binaries
          items: [aide, aide.wrapper, update-aide.con, logcheck, syslog-summary, osqueryd, ossec-syscheckd]
        
        - list: vpn_binaries
          items: [openvpn]
        
        - list: nomachine_binaries
          items: [nxexec, nxnode.bin, nxserver.bin, nxclient.bin]
        
        - list: mail_binaries
          items: [
            sendmail, sendmail-msp, postfix, procmail, exim4,
            pickup, showq, mailq, dovecot, imap-login, imap,
            mailmng-core, pop3-login, dovecot-lda, pop3
            ]
        
        - list: mail_config_binaries
          items: [
            update_conf, parse_mc, makemap_hash, newaliases, update_mk, update_tlsm4,
            update_db, update_mc, ssmtp.postinst, mailq, postalias, postfix.config.,
            postfix.config, postfix-script, postconf
            ]
        
        - list: sensitive_file_names
          items: [/etc/shadow, /etc/sudoers, /etc/pam.conf, /etc/security/pwquality.conf]
        
        - list: sensitive_directory_names
          items: [/, /etc, /etc/, /root, /root/]
        
        - macro: sensitive_files
          condition: >
            (fd.name in (sensitive_file_names) or
              fd.directory in (/etc/sudoers.d, /etc/pam.d))
        
        - macro: proc_is_new
          condition: (proc.duration <= 5000000000)
        
        - macro: container
          condition: (container.id != host)
        
        - macro: interactive
          condition: >
            ((proc.aname=sshd and proc.name != sshd) or
            proc.name=systemd-logind or proc.name=login)
        
        - list: cron_binaries
          items: [anacron, cron, crond, crontab]
        
        - list: needrestart_binaries
          items: [needrestart, 10-dpkg, 20-rpm, 30-pacman]
        
        - list: sshkit_script_binaries
          items: [10_etc_sudoers., 10_passwd_group]
        
        - macro: system_users
          condition: (user.name in (bin, daemon, games, lp, mail, nobody, sshd, sync, uucp, www-data))
        
        - macro: ansible_running_python
          condition: (proc.name in (python, pypy, python3) and proc.cmdline contains ansible)
        
        - macro: run_by_qualys
          condition: >
            (proc.pname=qualys-cloud-ag or
              proc.aname[2]=qualys-cloud-ag or
              proc.aname[3]=qualys-cloud-ag or
              proc.aname[4]=qualys-cloud-ag)
        
        - macro: run_by_google_accounts_daemon
          condition: >
            (proc.aname[1] startswith google_accounts or
              proc.aname[2] startswith google_accounts or
              proc.aname[3] startswith google_accounts)
        
        - macro: run_by_chef
          condition: (proc.aname[2]=chef_command_wr or proc.aname[3]=chef_command_wr or
                      proc.aname[2]=chef-client or proc.aname[3]=chef-client or
                      proc.name=chef-client)
        
        - macro: run_by_foreman
          condition: >
            (user.name=foreman and
              ((proc.pname in (rake, ruby, scl) and proc.aname[5] in (tfm-rake,tfm-ruby)) or
              (proc.pname=scl and proc.aname[2] in (tfm-rake,tfm-ruby))))
        
        - macro: python_mesos_marathon_scripting
          condition: (proc.pcmdline startswith "python3 /marathon-lb/marathon_lb.py")
        
        - macro: splunk_running_forwarder
          condition: (proc.pname=splunkd and proc.cmdline startswith "sh -c /opt/splunkforwarder")
        
        - macro: perl_running_plesk
          condition: (proc.cmdline startswith "perl /opt/psa/admin/bin/plesk_agent_manager" or
                      proc.pcmdline startswith "perl /opt/psa/admin/bin/plesk_agent_manager")
        
        - macro: perl_running_updmap
          condition: (proc.cmdline startswith "perl /usr/bin/updmap")
        
        - macro: perl_running_centrifydc
          condition: (proc.cmdline startswith "perl /usr/share/centrifydc")
        
        - macro: runuser_reading_pam
          condition: (proc.name=runuser and fd.directory=/etc/pam.d)
        
        - macro: linux_bench_reading_etc_shadow
          condition: ((proc.aname[2]=linux-bench and
                        proc.name in (awk,cut,grep)) and
                      (fd.name=/etc/shadow or
                        fd.directory=/etc/pam.d))
        
        - macro: veritas_driver_script
          condition: (proc.cmdline startswith "perl /opt/VRTSsfmh/bin/mh_driver.pl")
        
        - macro: user_ssh_directory
          condition: (fd.name contains '/.ssh/' and fd.name glob '/home/*/.ssh/*')
        
        - macro: directory_traversal
          condition: (fd.nameraw contains '../' and fd.nameraw glob '*../*../*')
        
        - list: docker_binaries
          items: [docker, dockerd, containerd-shim, "runc:[1:CHILD]", pause, exe, docker-compose, docker-entrypoi, docker-runc-cur, docker-current, dockerd-current]
        
        - list: known_ptrace_binaries
          items: []
        
        - macro: known_ptrace_procs
          condition: (proc.name in (known_ptrace_binaries))
        
        - macro: ptrace_attach_or_injection
          condition: >
            (evt.type=ptrace and
            (evt.arg.request contains PTRACE_POKETEXT or
            evt.arg.request contains PTRACE_POKEDATA or
            evt.arg.request contains PTRACE_ATTACH or
            evt.arg.request contains PTRACE_SEIZE or
            evt.arg.request contains PTRACE_SETREGS))

        # ==========================================================
        #                         RULES
        # ==========================================================
        
        - rule: Custom Alert Privilege Escalation
          desc: Detect privilege escalation attempts
          condition: >
            spawned_process and
            proc.name in (sudo, su, doas) and
            proc.cmdline contains "root"
          output: >
            Alert: Privilege escalation attempt
            (user=%user.name command=%proc.cmdline container=%container.name)
          priority: ALERT
          tags: [privilege, escalation, alert]
        
        - rule: Custom Alert Persistence Mechanism
          desc: Detect persistence mechanism creation
          condition: >
            spawned_process and
            proc.name in (crontab, systemctl, chkconfig) and
            proc.cmdline contains "enable"
          output: >
            Alert: Persistence mechanism created
            (user=%user.name command=%proc.cmdline container=%container.name)
          priority: ALERT
          tags: [persistence, alert]

        - rule: Directory traversal monitored file read
          desc: >
            Web applications can be vulnerable to directory traversal attacks that allow accessing files outside of the web app's root directory.
          condition: >
            (open_read or open_file_failed)
            and (etc_dir or user_ssh_directory or
                  fd.name startswith /root/.ssh or
                  fd.name contains "id_rsa")
            and directory_traversal
            and not proc.pname in (shell_binaries)
          enabled: true
          output: "Read monitored file via directory traversal | file=%fd.name fileraw=%fd.nameraw command=%proc.cmdline"
          priority: WARNING
          tags: [maturity_stable, host, container, filesystem, mitre_credential_access, T1555]
        
        - macro: cmp_cp_by_passwd
          condition: (proc.name in (cmp, cp) and proc.pname in (passwd, run-parts))
        
        - macro: user_known_read_sensitive_files_activities
          condition: (never_true)
        
        - rule: Read sensitive file trusted after startup
          desc: >
            An attempt to read any sensitive file (e.g. files containing user/password/authentication
            information) by a trusted program after startup.
          condition: >
            open_read
            and sensitive_files
            and server_procs
            and not proc_is_new
            and proc.name!="sshd"
            and not user_known_read_sensitive_files_activities
          output: "Sensitive file opened for reading by trusted program | file=%fd.name command=%proc.cmdline"
          priority: WARNING
          tags: [maturity_stable, host, container, filesystem, mitre_credential_access, T1555]
        
        - list: read_sensitive_file_binaries
          items: [
            iptables, ps, lsb_release, check-new-relea, dumpe2fs, accounts-daemon, sshd,
            vsftpd, systemd, mysql_install_d, psql, screen, debconf-show, sa-update,
            pam-auth-update, pam-config, /usr/sbin/spamd, polkit-agent-he, lsattr, file, sosreport,
            scxcimservera, adclient, rtvscand, cockpit-session, userhelper, ossec-syscheckd,
            sshd-session
            ]
        
        - macro: user_read_sensitive_file_conditions
          condition: cmp_cp_by_passwd
        
        - list: read_sensitive_file_images
          items: []
        
        - macro: user_read_sensitive_file_containers
          condition: (container and container.image.repository in (read_sensitive_file_images))
        
        - macro: mandb_postinst
          condition: >
            (proc.name=perl and proc.args startswith "-e" and
            proc.args contains "@pwd = getpwnam(" and
            proc.args contains "exec " and
            proc.args contains "/usr/bin/mandb")
        
        - rule: Read sensitive file untrusted
          desc: >
            An attempt to read any sensitive file.
          condition: >
            open_read
            and sensitive_files
            and proc_name_exists
            and not proc.name in (user_mgmt_binaries, userexec_binaries, package_mgmt_binaries,
              cron_binaries, read_sensitive_file_binaries, shell_binaries, hids_binaries,
              vpn_binaries, mail_config_binaries, nomachine_binaries, sshkit_script_binaries,
              in.proftpd, mandb, salt-call, salt-minion, postgres_mgmt_binaries,
              google_oslogin_
              )
            and not cmp_cp_by_passwd
            and not ansible_running_python
            and not run_by_qualys
            and not run_by_chef
            and not run_by_google_accounts_daemon
            and not user_read_sensitive_file_conditions
            and not mandb_postinst
            and not perl_running_plesk
            and not perl_running_updmap
            and not veritas_driver_script
            and not perl_running_centrifydc
            and not runuser_reading_pam
            and not linux_bench_reading_etc_shadow
            and not user_known_read_sensitive_files_activities
            and not user_read_sensitive_file_containers
          output: "Sensitive file opened for reading by non-trusted program | file=%fd.name command=%proc.cmdline"
          priority: WARNING
          tags: [maturity_stable, host, container, filesystem, mitre_credential_access, T1555]
        
        - rule: PTRACE attached to process
          desc: Detect an attempt to inject or attach to a process using PTRACE
          condition: >
            ptrace_attach_or_injection
            and proc_name_exists
            and not known_ptrace_procs
          output: >
            PTRACE attach or injection detected
            (process=%proc.name parent=%proc.pname command=%proc.cmdline
             container_id=%container.id container_name=%container.name image=%container.image.repository)
          priority: ERROR
          tags: [maturity_stable, host, container, process, mitre_privilege_escalation, T1055.008]
        
        - rule: Write below binary dir
          desc: An attempt to write to any file below a set of binary directories
          condition: >
            open_write
            and bin_dir
            and not package_mgmt_procs
          output: "File below a known binary directory opened for writing | file=%fd.name command=%proc.cmdline"
          priority: ERROR
          tags: [filesystem, mitre_persistence]
        
        - rule: Write below etc (Critical)
          desc: Detects any attempt to write to the /etc directory (including shadow)
          # --- UNIVERSAL FILTER FOR CALICO, OPENSHIFT, AND KUBEARMOR ---
          condition: open_write and etc_dir and not calico_runit_etc_writes and not openshift_system_etc_writes and not kubearmor_apparmor_writes
          output: "CRITICAL: Write to /etc directory | file=%fd.name command=%proc.cmdline"
          priority: CRITICAL
          tags: [filesystem, mitre_persistence, critical]
        
        - rule: Malicious Crypto Miner Detected
          desc: Detects an attempt to write a file with a name associated with crypto miners
          condition: open_write and fd.name contains "miner"
          output: "CRITICAL: Crypto miner binary detected | file=%fd.name command=%proc.cmdline"
          priority: CRITICAL
          tags: [mitre_execution, critical]
        
        - rule: Critical Shadow Modification
          desc: Detects any attempt to write to the /etc/shadow file
          condition: open_write and fd.name=/etc/shadow
          output: "CRITICAL: Shadow file tampered! | file=%fd.name command=%proc.cmdline"
          priority: CRITICAL
          tags: [security, critical]

---
# 4. Dynamic ConfigMap Script (Updated to use rules file & Modern BPF)
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mychart.fullname" . }}-installer-script
  namespace: {{ include "mychart.namespace" . }}
  labels:
    {{- include "mychart.labels" . | nindent 4 }}
data:
  install.sh: |
    #!/bin/sh
    set -e
    echo "🚀 Starting Falco Installation into {{ $targetNs }}..."
    
    helm repo add falcosecurity https://falcosecurity.github.io/charts
    helm repo update
    
    # We pass the custom-rules.yaml file from the mounted volume.
    # Fixed the driver kind to 'modern_ebpf' to ensure it installs successfully across all clouds
    helm upgrade --install falco falcosecurity/falco \
      --namespace {{ $targetNs }} \
      --create-namespace \
      --set tty=true \
      --set falco.watch_config_files=false \
      --set falcoctl.artifact.follow.enabled=false \
      --set driver.kind=modern_ebpf \
      -f /rules/custom-rules.yaml \
      --wait

    echo "✅ Installation Complete in {{ $targetNs }}!"

---
# 5. Dynamic Job
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "mychart.fullname" . }}-installer-job
  namespace: {{ include "mychart.namespace" . }}
  labels:
    {{- include "mychart.labels" . | nindent 4 }}
spec:
  template:
    spec:
      serviceAccountName: {{ $saName }}
      restartPolicy: Never
      containers:
      - name: installer
        image: docker.io/alpine/helm:latest
        command: ["/bin/sh", "/scripts/install.sh"]
        volumeMounts:
        - name: script-volume
          mountPath: /scripts
        - name: rules-volume
          mountPath: /rules
      volumes:
      - name: script-volume
        configMap:
          name: {{ include "mychart.fullname" . }}-installer-script
          defaultMode: 0777
      - name: rules-volume
        configMap:
          name: {{ include "mychart.fullname" . }}-custom-rules
